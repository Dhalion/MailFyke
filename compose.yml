services:
  db:
    image: postgres:18.3
    environment:
      POSTGRES_USER: mailfyke
      POSTGRES_PASSWORD: mailfyke
      POSTGRES_DB: mailfyke
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailfyke"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
